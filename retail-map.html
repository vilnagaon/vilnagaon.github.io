var chainColors = {"Delhaize":"#c41e3a","Intermarché":"#e67e22","Carrefour":"#1565c0","Spar":"#2e7d32"};

function makeIcon(chain) {
  var c = chainColors[chain] || "#16393E";
  return L.divIcon({
    html:'<div style="background:'+c+';width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);font-size:13px;color:#fff;font-weight:700;">'+chain.charAt(0)+'</div>',
    className:'',iconSize:[30,30],iconAnchor:[15,15],popupAnchor:[0,-18]
  });
}

var map = L.map('map').setView([50.5,4.5],8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:19
}).addTo(map);

var markers = L.markerClusterGroup({ maxClusterRadius:35, showCoverageOnHover:false });
var allMarkers = [];

locations.forEach(function(loc) {
  var chainColor = chainColors[loc.chain] || "#16393E";
  var popup = '<div class="popup-chain" style="color:'+chainColor+'">'+loc.chain+'</div>'+
    '<div class="popup-title">'+loc.client+'</div>'+
    '<div class="popup-address">'+loc.address+'<br>'+loc.cp+'</div>'+
    '<div class="popup-stats">'+
    '<div><strong>'+loc.ca+'</strong>CA total</div>'+
    '<div><strong>'+loc.nb_cmd+'</strong>commandes</div></div>';
  var m = L.marker([loc.lat,loc.lon],{icon:makeIcon(loc.chain)}).bindPopup(popup);
  m._data = loc;
  allMarkers.push(m);
  markers.addLayer(m);
});
map.addLayer(markers);

var searchInput = document.getElementById('searchInput');
var visibleCount = document.getElementById('visibleCount');
var activeChain = 'all';

function filterMarkers() {
  var q = searchInput.value.toLowerCase();
  markers.clearLayers();
  var count = 0;
  allMarkers.forEach(function(m) {
    var d = m._data;
    var ms = !q || d.client.toLowerCase().includes(q) || d.cp.toLowerCase().includes(q) || d.address.toLowerCase().includes(q);
    var mc = activeChain==='all' || d.chain===activeChain;
    if(ms && mc) { markers.addLayer(m); count++; }
  });
  visibleCount.textContent = count+' point'+(count>1?'s':'');
}

searchInput.addEventListener('input', filterMarkers);
document.querySelectorAll('.fbtn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.fbtn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    activeChain = btn.dataset.chain;
    filterMarkers();
  });
});
</script>
